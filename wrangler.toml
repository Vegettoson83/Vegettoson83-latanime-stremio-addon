name = "latanime"
main = "src/index.ts"
compatibility_date = "2026-04-04"
compatibility_flags = ["nodejs_compat"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true
[observability.traces]
enabled = true

[vars]
TMDB_KEY     = ""
MFP_URL      = ""
MFP_PASSWORD = "latanime"
# Non-Cloudflare HTML fetch proxy. latanime.org blocks Cloudflare Worker egress;
# this relays its HTML from a non-Cloudflare IP. Two implementations ship in the
# repo — point this at whichever you deploy:
#   • Deno Deploy (deno/fetch.ts): https://<project>.deno.dev/fetch  ← preferred
#       (always-warm edge, no cold starts; see deno/README.md)
#   • Vercel (api/fetch.js):       https://<project>.vercel.app/api/fetch
FETCH_PROXY_URL = "https://vegettoson83-latanime-stremio-addon.vercel.app/api/fetch"
# Cloudflare Browser Rendering (optional). Set CF_ACCOUNT_ID here and the
# token as a secret:  wrangler secret put CF_API_TOKEN
# Token needs the "Browser Rendering: Edit" permission. Leave blank to keep
# extraction fully manual (no browser, no cost).
CF_ACCOUNT_ID = ""

[[kv_namespaces]]
binding     = "STREAM_CACHE"
id          = "19b6cbbb876343ffa950e8a72959b7f3"
